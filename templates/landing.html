<!DOCTYPE html>
<html>
<head>
    <title>Docket</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        .hero{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        h1{
            font-size:60px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            width:60%;
        }

        .buttons{
            margin-top:30px;
        }

        a{
            text-decoration:none;
            padding:15px 30px;
            border-radius:10px;
            margin:10px;
            color:white;
            font-weight:bold;
        }

        .login{
            background:#2563eb;
        }

        .register{
            background:#16a34a;
        }
    </style>
</head>

<body>

<div class="hero">

    <h1>Docket</h1>

    <p>
        Smart task management system for productivity,
        reminders, and daily workflow organization.
    </p>

    <div class="buttons">
        <a class="login" href="/accounts/login/">Login</a>
        <a class="register" href="/accounts/register/">Register</a>
    </div>

</div>

</body>
</html>
