<!DOCTYPE html>
<html>
<head>
    <title>Docket</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            padding:20px 60px;
            background:#111827;
        }

        .buttons a{
            text-decoration:none;
            margin-left:15px;
            padding:10px 20px;
            border-radius:8px;
            color:white;
            background:#2563eb;
        }

        .hero{
            height:80vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:60px;
            margin-bottom:10px;
        }

        p{
            max-width:700px;
            font-size:20px;
            color:#cbd5e1;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Docket</h2>

    <div class="buttons">
        <a href="/accounts/login/">Login</a>
        <a href="/accounts/register/">Register</a>
    </div>
</div>

<div class="hero">
    <h1>Smart Task Management System</h1>

    <p>
        Organize your work, track tasks, manage productivity,
        and complete your goals efficiently with Docket.
    </p>
</div>

</body>
</html>
