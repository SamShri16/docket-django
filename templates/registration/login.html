<!DOCTYPE html>
<html>
<head>
    <title>Login - Docket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
<h1 style="color:red;">CUSTOM LOGIN PAGE</h1>
<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 bg-secondary" style="width:400px;">
    <h3 class="text-center">Login</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>

        <div class="input-group mb-3">
            <input type="password" id="password" name="password" placeholder="Password" class="form-control" required>
            <button type="button" class="btn btn-light" onclick="togglePassword()">👁</button>
        </div>

        <button type="submit" class="btn btn-success w-100">Login</button>
    </form>

    <p class="mt-3 text-center">
        New user? <a href="/accounts/register/" class="text-warning">Register</a>
    </p>
</div>

</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
