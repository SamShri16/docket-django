{% extends 'base.html' %}

{% block content %}

<div class="sidebar">

    <h2>🚀 Docket</h2>

    <a href="/dashboard/">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </a>

    <a href="/dashboard/add/">
        <i class="fa-solid fa-plus"></i>
        Add Task
    </a>

    <a href="/dashboard/tasks/">
        <i class="fa-solid fa-list"></i>
        My Tasks
    </a>

    <a href="/accounts/logout/">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </a>

</div>

<div class="main-content">

    <div class="topbar">

        <div>
            <h1>Add New Task</h1>
            <p>Create and manage your productivity tasks.</p>
        </div>

        <div class="profile-box">
            👤 {{ request.user.username }}
        </div>

    </div>

    <div class="glass-card">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label>Task Title</label>
                <input
                    type="text"
                    name="title"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea
                    name="description"
                    rows="4"
                    class="form-control"
                ></textarea>
            </div>

            <div class="mb-3">
                <label>Category</label>

                <select
                    name="category"
                    class="form-select"
                >
                    <option>Work</option>
                    <option>Study</option>
                    <option>Daily</option>
                    <option>Home</option>
                    <option>Personal</option>
                </select>
            </div>

            <div class="mb-4">
                <label>Due Date</label>

                <input
                    type="datetime-local"
                    name="due_date"
                    class="form-control"
                >
            </div>

            <button class="btn btn-success w-100">
                Add Task
            </button>

        </form>

    </div>

</div>

{% endblock %}
