{% extends 'base.html' %}

{% block content %}

<div class="page-header">

    <h1>➕ Add New Task</h1>

    <p>Create and manage your productivity tasks.</p>

</div>

<div class="section-card">

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <label>Task Title</label>

            {{ form.title }}

        </div>

        <div class="form-group">

            <label>Description</label>

            {{ form.description }}

        </div>

        <div class="form-group">

            <label>Category</label>

            {{ form.category }}

        </div>

        <div class="form-group">

            <label>Due Date</label>

            {{ form.due_date }}

        </div>

        <button type="submit"
                class="submit-btn">

            Add Task

        </button>

    </form>

</div>

{% endblock %}
