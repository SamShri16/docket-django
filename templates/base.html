{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Docket Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body{
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
        }

        .sidebar{
            width: 250px;
            background: rgba(0,0,0,0.35);
            min-height: 100vh;
            position: fixed;
            padding: 25px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar h2{
            margin-bottom: 40px;
            font-weight: bold;
        }

        .sidebar a{
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .sidebar a:hover{
            background: rgba(255,255,255,0.15);
        }

        .main-content{
            margin-left: 270px;
            padding: 30px;
        }

        .glass-card{
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .task-card{
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
        }

        .task-card h5{
            color: white;
            font-weight: bold;
        }

        .task-card p{
            color: #dcdcdc;
        }

        .task-meta{
            color: #ffc107;
            font-size: 14px;
        }

        .topbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .profile-box{
            background: rgba(255,255,255,0.08);
            padding: 10px 20px;
            border-radius: 12px;
        }

        .stats-box{
            border-radius: 18px;
            padding: 25px;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .blue-box{
            background: #0d6efd;
        }

        .green-box{
            background: #198754;
        }

        .yellow-box{
            background: #ffc107;
            color: black;
        }

        .form-control,
        .form-select{
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder{
            color: #cccccc;
        }

        .form-control:focus{
            background: rgba(255,255,255,0.15);
            color: white;
            box-shadow: none;
        }

    </style>
</head>

<body>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
