<!DOCTYPE html>
<html>
<head>
    <title>Docket Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="d-flex">

    <!-- 🔥 SIDEBAR -->
    <div class="bg-black p-3" style="width: 250px; height: 100vh;">
        <h4>🚀 Docket</h4>
        <hr>

        <a href="/dashboard/" class="btn btn-outline-light w-100 mb-2">Dashboard</a>
        <a href="/dashboard/add/" class="btn btn-outline-success w-100 mb-2">Add Task</a>
        <a href="/dashboard/tasks/" class="btn btn-outline-info w-100 mb-2">My Tasks</a>
        <a href="/accounts/profile/" class="btn btn-outline-warning w-100 mb-2">Profile</a>
        <a href="/accounts/logout/" class="btn btn-danger w-100">Logout</a>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="container mt-4">

        <h2>📊 Dashboard</h2>
        <p>Top 5 Pending Tasks</p>

        {% for task in tasks %}
            <div class="card bg-secondary p-2 mb-2">
                {{ task.title }}
            </div>
        {% empty %}
            <p>No pending tasks</p>
        {% endfor %}

    </div>

</div>

</body>
</html>
