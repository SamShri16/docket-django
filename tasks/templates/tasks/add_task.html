<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>

    <style>
        body{
            font-family:Arial;
            background:#f1f5f9;
            padding:40px;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:12px;
            max-width:500px;
            margin:auto;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            background:#2563eb;
            color:white;
            padding:12px 20px;
            border:none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Add Task</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Task Title">

        <textarea name="description" placeholder="Description"></textarea>

        <button type="submit">Add Task</button>

    </form>

</div>

</body>
</html>
