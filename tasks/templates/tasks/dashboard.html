<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:#f1f5f9;
        }

        .navbar{
            background:#111827;
            color:white;
            padding:20px;
            display:flex;
            justify-content:space-between;
        }

        .container{
            padding:40px;
        }

        .cards{
            display:flex;
            gap:20px;
            margin-top:30px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            flex:1;
        }

        .buttons a{
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:10px 20px;
            border-radius:8px;
            margin-right:10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Docket Dashboard</h2>

    <div>
        <a style="color:white;" href="/accounts/logout/">Logout</a>
    </div>
</div>

<div class="container">

    <h1>Welcome, {{ user.username }}</h1>

    <div class="buttons">
        <a href="/add-task/">Add Task</a>
        <a href="/my-tasks/">My Tasks</a>
    </div>

    <div class="cards">

        <div class="card">
            <h2>Total Tasks</h2>
            <h1>{{ total_tasks }}</h1>
        </div>

        <div class="card">
            <h2>Completed</h2>
            <h1>{{ completed_tasks }}</h1>
        </div>

        <div class="card">
            <h2>Pending</h2>
            <h1>{{ pending_tasks }}</h1>
        </div>

    </div>

</div>

</body>
</html>
