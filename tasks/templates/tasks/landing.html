<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Docket</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, sans-serif;

            background:#0f172a;
            color:white;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{

            text-align:center;

            width:90%;
            max-width:700px;

            padding:50px;

            background:#1e293b;

            border-radius:20px;
        }

        h1{
            font-size:60px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            line-height:1.6;
            color:#cbd5e1;
            margin-bottom:40px;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:20px;
        }

        a{
            text-decoration:none;
        }

        button{

            padding:15px 30px;

            border:none;
            border-radius:10px;

            font-size:18px;
            cursor:pointer;

            transition:0.3s;
        }

        .login{
            background:#38bdf8;
            color:black;
        }

        .register{
            background:#22c55e;
            color:white;
        }

        button:hover{
            transform:scale(1.05);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Docket</h1>

        <p>

            Smart Task Management System built using Django.

            Organize tasks, manage productivity, track completed work,
            and stay consistent every day.

        </p>

        <div class="buttons">

            <a href="/accounts/login/">
                <button class="login">
                    Login
                </button>
            </a>

            <a href="/accounts/register/">
                <button class="register">
                    Register
                </button>
            </a>

        </div>

    </div>

</body>

</html>
