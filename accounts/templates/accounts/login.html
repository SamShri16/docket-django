<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Docket</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#0f172a;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#334155;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #cbd5e1;
            border-radius:10px;
            font-size:16px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }

        .errorlist{
            color:red;
            margin-bottom:10px;
            list-style:none;
        }
    </style>
</head>
<body>

    <div class="login-box">

        <h1>Docket Login</h1>

        <form method="POST">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <div class="input-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="input-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn">
                Login
            </button>
        </form>

        <div class="register-link">
            Don't have an account?
            <a href="/accounts/register/">Register</a>
        </div>

    </div>

</body>
</html>
