<!DOCTYPE html>
<html>
<head>
    <title>Register - Docket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow-lg bg-secondary text-white" style="width: 400px;">
        <h3 class="text-center mb-3">📝 Register</h3>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
            <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" class="form-control mb-2" required>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <hr>

        <p class="text-center">
            Already have an account?
            <a href="/accounts/login/" class="text-warning">Login</a>
        </p>
    </div>

</div>

</body>
</html>
